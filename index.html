<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #000000;
        }

        .center-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: white;
            font-size: 5vw;
            font-weight: bold;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        @media (max-width:768px) {
            .center-text {
                font-size: 8vw;
            }
        }
    </style>
</head>
<body>

<div id="tsparticles"></div>

<div class="center-text">
    Website Maintenance
</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    tsParticles.load("tsparticles", {
        background: {
            color: {
                value: "#000000"
            }
        },
        particles: {
            number: {
                value: 300,
                density: {
                    enable: true,
                    area: 800
                }
            },
            color: {
                value: "#ffffff"
            },
            shape: {
                type: "circle"
            },
            opacity: {
                value: {
                    min: 0.1,
                    max: 0.8
                }
            },
            size: {
                value: {
                    min: 1,
                    max: 2
                }
            },
            links: {
                enable: true,
                distance: 150,
                color: "#ffffff",
                opacity: 0.4,
                width: 1
            },
            move: {
                enable: true,
                speed: 1,
                direction: "none",
                outModes: "out"
            }
        },
        interactivity: {
            events: {
                onHover: {
                    enable: true,
                    mode: "repulse"
                }
            },
            modes: {
                repulse: {
                    distance: 150,
                    duration: 0.4
                }
            }
        }
    });
});
</script>

</body>
</html>
